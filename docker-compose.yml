services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: render-tests-php
    working_dir: /var/www
    volumes:
      - ./:/var/www
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 -t public
    stdin_open: true
    tty: true